name: Build & Release

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ── Debug APK (every push / PR) ──────────────────────────────────────────────
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/AggregatorX-v${{ github.run_number }}-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AggregatorX-debug-${{ github.run_number }}
          path: artifacts/AggregatorX-v${{ github.run_number }}-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        run: |
          SIZE=$(du -sh artifacts/*.apk | cut -f1)
          {
            echo "## AggregatorX Debug — Build #${{ github.run_number }}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| APK size | $SIZE |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo ""
            echo "Download from **Actions → This run → Artifacts**."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Release APK (main/master only, unsigned) ──────────────────────────────────
  build-release:
    name: Release APK (unsigned)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build-debug
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             artifacts/AggregatorX-v${{ github.run_number }}-release-unsigned.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AggregatorX-release-${{ github.run_number }}
          path: artifacts/AggregatorX-v${{ github.run_number }}-release-unsigned.apk
          retention-days: 90
          if-no-files-found: warn

  # ── GitHub Release (tags only) ────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/*.apk
          name: AggregatorX v${{ steps.version.outputs.VERSION }}
          body: |
            ## AggregatorX v${{ steps.version.outputs.VERSION }}

            ### What's included
            - Thumbnails visible for all provider results
            - Watch button plays video in-app with full player controls (seek, skip ±10s, play/pause)
            - Tap thumbnail for inline preview; long-press to expand
            - Open in App launches dedicated full-screen VideoPlayerActivity
            - Coil3 image loader uses correct User-Agent to prevent 403s on provider sites
            - HLS / DASH / Progressive auto-detection with format fallback

            ### Install
            Download the APK below and install on your Android device (enable "Install from unknown sources").
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
